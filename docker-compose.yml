version: "3.8"

services:
  personalwebsite:
    container_name: personalwebsite
    image: personalwebsite
    build:
      context: .
    deploy:
      restart_policy:
        condition: unless-stopped
  
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      restart_policy:
        condition: unless-stopped