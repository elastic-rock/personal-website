version: "3.8"

services:
  personalwebsite:
    container_name: personalwebsite
    image: personalwebsite
    build:
      context: .
    deploy:
      restart_policy:
        condition: unless-stopped
  
  nginx:
    depends_on:
      - certbot
    container_name: nginx
    image: nginx:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
    deploy:
      restart_policy:
        condition: unless-stopped

  certbot:
    container_name: certbot
    image: certbot/certbot:latest
    volumes:
     - certbot-etc:/etc/letsencrypt:rw
    command: certonly --standalone --email <email> --agree-tos --no-eff-email --force-renewal -d davidweis.eu -d www.davidweis.eu

volumes:
  certbot-etc