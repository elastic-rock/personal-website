server {
    listen 80;
    server_name sbirka;

    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    ssi on;
    ssi_types text/shtml text/html;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}