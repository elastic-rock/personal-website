access_log off;

server {
    listen 80;
    listen [::]:80;

    server_name davidweis.eu www.davidweis.eu;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name davidweis.eu www.davidweis.eu;

    ssl_certificate /etc/letsencrypt/live/davidweis.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidweis.eu/privkey.pem;

    location / {
        proxy_pass http://personalwebsite:3000/;
    }
}